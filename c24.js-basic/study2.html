<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계산 도구</title>
</head>
<body>
    <script>
        console.log(Math.ceil(5.33))
        console.log(Math.floor(5.99))
        console.log(Math.round(5.99))
        console.log(Math.pow(10,2))
        console.log(Math.sqrt(100))
        console.log(Math.abs(-30))
        console.log(Math.max(3,1,4,5,21))
        console.log(Math.min(1,2,3,4))
        console.log(Math.random())
        console.log(Math.round((Math.random()*44))+1)
        console.log(3.411592342353.toFixed(3))
    </script>
</body>
</html>
